name: Build and test

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector
        run: go test -race -count=1 -timeout 2m ./...

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o bin/p2p-ci-proxy ./cmd/proxy

      - name: Verify binary
        run: ./bin/p2p-ci-proxy --help || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: golangci/golangci-lint-action@v4
        with:
          version: latest
